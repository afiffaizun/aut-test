name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      skip_migrations:
        description: 'Skip database migrations'
        required: false
        default: 'false'
        type: boolean

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.tags }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,prefix=

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to ${{ inputs.environment }}
    runs-on: ubuntu-latest
    needs: [build-push]
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download docker-compose
        run: |
          curl -L "https://github.com/docker/compose/releases/download/v2.24.0/docker-compose-$(uname -s)-$(uname -m)" -o docker-compose
          chmod +x docker-compose

      - name: Create deployment directory
        run: |
          echo "DEPLOYMENT_CONFIG" >> deployment.env
          echo "IMAGE=${{ needs.build-push.outputs.image }}" >> deployment.env
          cat deployment.env

      - name: Pull new image
        run: |
          docker pull ${{ needs.build-push.outputs.image }}

      - name: Stop old container
        run: |
          docker compose down || true
          docker rm -f auth-service || true

      - name: Start new container
        run: |
          docker run -d \
            --name auth-service \
            --restart unless-stopped \
            -p 8080:8080 \
            --env-file .env \
            ${{ needs.build-push.outputs.image }}

      - name: Verify deployment
        run: |
          sleep 5
          curl -f http://localhost:8080/health || exit 1

  migrations:
    name: Run Database Migrations
    runs-on: ubuntu-latest
    needs: [build-push]
    if: ${{ inputs.skip_migrations == false }}
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install SQLC
        run: go install github.com/sqlc-dev/sqlc/cmd/sqlc@latest

      - name: Generate SQLC code
        run: sqlc generate

      - name: Apply migrations
        run: |
          echo "Applying database migrations..."
          echo "Note: Migrations should be applied manually or via migration tool"
          cat sql/schema.sql

      - name: Run migrations via Docker
        run: |
          docker run --rm \
            -v $(pwd)/sql:/sql \
            postgres:16-alpine \
            psql -h localhost -U postgres -d auth_service -f /sql/schema.sql || true